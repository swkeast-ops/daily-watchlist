name: Daily Stock Watchlist

on:
  schedule:
    # 香港时间 09:00 早盘报告
    - cron: '0 1 * * *'
    # 香港时间 16:30 收盘报告
    - cron: '30 8 * * *'
  workflow_dispatch:  # 允许手动触发运行

jobs:
  run-watchlist:
    runs-on: ubuntu-latest
    env:
      TZ: Asia/Hong_Kong  # 强制服务器使用香港时区
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install yfinance pandas numpy requests google-genai

      - name: Run watchlist script
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          STOCK_LIST: ${{ secrets.STOCK_LIST }}
        run: python watchlist.py
