name: Daily AI Stock Watchlist

on:
  schedule:
    - cron: '0 1 * * *'   # 香港时间 09:00 早盘
    - cron: '30 8 * * *' # 香港时间 16:30 收盘
  workflow_dispatch: # 允许手动运行

jobs:
  run-report:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install akshare yfinance requests google-generativeai python-dotenv

      - name: Run the watchlist script
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          STOCK_LIST: ${{ secrets.STOCK_LIST }}
        run: |
          python watchlist.py
